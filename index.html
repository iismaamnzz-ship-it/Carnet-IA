<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarnetIA – Aprueba tu carnet con IA</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d18; color: #e8e8f0; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
    .fade-up { animation: fadeUp 0.4s ease both; }
    .ccard:hover { transform:translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .mcard:hover { transform: translateX(4px); background: #1a1a30 !important; }
    .opt-card { background: #131322; border: 1px solid #1e1e32; border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 12px; font-size: 14px; }
    .opt-card:hover { background: #1a1a30; border-color: #3b82f6; }
    input::placeholder { color: #555; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CARNETS = [
      { id: "b",       label: "Coche B",     emoji: "🚗", color: "#f59e0b", desc: "Permiso tipo B · El más común",     preguntas: 3, fallos: 3 },
      { id: "a",       label: "Moto A/A2",   emoji: "🏍️", color: "#ef4444", desc: "Permiso tipo A · Dos ruedas",       preguntas: 2, fallos: 3 },
      { id: "c",       label: "Camión C",    emoji: "🚛", color: "#3b82f6", desc: "Permiso tipo C · Transporte",        preguntas: 3, fallos: 3 },
      { id: "d",       label: "Autobús D",   emoji: "🚌", color: "#8b5cf6", desc: "Permiso tipo D · Pasajeros",         preguntas: 3, fallos: 3 },
      { id: "nautica", label: "Náutica PNB", emoji: "⛵", color: "#06b6d4", desc: "PNB · Patrón de navegación básica",  preguntas: 3, fallos: 3 },
      { id: "piloto",  label: "Piloto PPL",  emoji: "✈️", color: "#10b981", desc: "Licencia piloto privado",            preguntas: 3, fallos: 3 },
      { id: "caza",    label: "Caza",        emoji: "🏹", color: "#ec4899", desc: "Licencia de caza e ingeniería",       preguntas: 3, fallos: 3 }
    ];

    const PREGUNTAS_MOCK = {
      b: [
        { q: "¿Cuál es la velocidad máxima permitida para un turismo en una autopista?", options: ["90 km/h", "100 km/h", "120 km/h"], correct: 2 },
        { q: "Si la tasa de alcohol en sangre es superior a la permitida...", options: ["Solo te multan si causas un accidente.", "Está prohibido conducir.", "Puedes conducir con precaución."], correct: 1 },
        { q: "¿Qué indica una señal de peligro con un triángulo y un ciervo en el centro?", options: ["Paso obligatorio de animales domésticos.", "Peligro por la proximidad de un lugar donde pueden cruzar animales sueltos.", "Zona de caza habilitada."], correct: 1 }
      ],
      a: [
        { q: "¿Es obligatorio el uso del casco para el conductor de una motocicleta?", options: ["No, si circula por ciudad.", "Sí, siempre, en cualquier tipo de vía.", "Solo si lleva pasajero."], correct: 1 },
        { q: "El uso de guantes protectores en moto...", options: ["Es obligatorio solo en invierno.", "Es altamente recomendable para evitar lesiones.", "Está prohibido."], correct: 1 }
      ]
    };

    const s = {
      app: { display: "flex", flexDirection: "column", minHeight: "100vh", background: "#0d0d18" },
      header: { padding: "20px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #1e1e32", background: "rgba(13,13,24,0.8)", backdropFilter: "blur(12px)", position: "sticky", top: 0, zIndex: 10 },
      logo: { fontSize: 20, fontWeight: 800, fontFamily: "'Syne', sans-serif", background: "linear-gradient(90deg, #fff, #888)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" },
      main: { flex: 1, padding: "24px", maxWidth: 800, width: "100%", margin: "0 auto", display: "flex", flexDirection: "column", gap: 24 },
      title: { fontSize: 28, fontWeight: 800, fontFamily: "'Syne', sans-serif", lineHeight: 1.2, color: "#fff" },
      subtitle: { fontSize: 15, color: "#8e8e9f", fontWeight: 400, marginTop: 4 },
      grid: { display: "flex", flexDirection: "column", gap: 12 },
      card: { background: "#131322", border: "1px solid #1e1e32", borderRadius: 16, padding: "16px 20px", display: "flex", alignItems: "center", gap: 16, cursor: "pointer", transition: "all 0.2s ease" },
      iconWrap: { width: 48, height: 48, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 },
      cardContent: { flex: 1 },
      cardTitle: { fontSize: 16, fontWeight: 700, color: "#fff" },
      cardDesc: { fontSize: 13, color: "#71718a", marginTop: 2 },
      badge: { background: "rgba(255,255,255,0.05)", padding: "4px 10px", borderRadius: 20, fontSize: 11, color: "#aaa", fontWeight: 500, border: "1px solid rgba(255,255,255,0.05)" },
      topBar: { display: "flex", alignItems: "center", gap: 12, borderBottom: "1px solid #1e1e32", paddingBottom: 16 },
      backBtn: { background: "none", border: "none", color: "#fff", fontSize: 20, cursor: "pointer", padding: "4px 8px" },
      chatContainer: { display: "flex", flexDirection: "column", height: "calc(100vh - 140px)", background: "#131322", border: "1px solid #1e1e32", borderRadius: 20, overflow: "hidden" },
      messagesArea: { flex: 1, padding: 20, overflowY: "auto", display: "flex", flexDirection: "column", gap: 14 },
      msgRow: { display: "flex", width: "100%" },
      bubble: { maxWidth: "80%", padding: "12px 16px", fontSize: 14, lineHeight: 1.5, boxShadow: "0 4px 12px rgba(0,0,0,0.1)" },
      chatInputWrap: { padding: 14, borderTop: "1px solid #1e1e32", background: "#0d0d18", display: "flex", gap: 10, alignItems: "center" },
      chatInput: { flex: 1, background: "#131322", border: "1px solid #1e1e32", borderRadius: 12, padding: "14px 16px", color: "#fff", fontSize: 14, outline: "none", fontFamily: "inherit" },
      sendBtn: { border: "none", color: "#fff", width: 46, height: 46, borderRadius: 12, fontSize: 18, fontWeight: "bold", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 },
      modeOption: { background: "#131322", border: "1px solid #1e1e32", borderRadius: 16, padding: "20px", display: "flex", alignItems: "center", gap: 16, cursor: "pointer", transition: "all 0.2s ease" },
      modeIcon: { width: 44, height: 44, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 },
      btnNext: { background: "#3b82f6", border: "none", color: "#fff", padding: "12px 24px", borderRadius: 10, fontWeight: "bold", cursor: "pointer", fontSize: 14, transition: "all 0.2s" }
    };

    function App() {
      const [carnet, setCarnet] = useState(null);
      const [mode, setMode] = useState(null); 
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const msgEndRef = useRef(null);

      const [questions, setQuestions] = useState([]);
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);
      const [score, setScore] = useState({ correct: 0, wrong: 0 });
      const [testFinished, setTestFinished] = useState(false);

      useEffect(() => {
        if (msgEndRef.current) msgEndRef.current.scrollIntoView({ behavior: "smooth" });
      }, [messages]);

      const handleCarnetSelect = (selectedCarnet) => {
        setCarnet(selectedCarnet);
        setMode("select_mode");
      };

      const startChatMode = () => {
        setMode("chat");
        setMessages([
          { role: "assistant", content: `¡Hola! Soy tu tutor de IA experto en el permiso de **${carnet.label}**. 🚗💨\n\nPregúntame cualquier duda sobre el temario, normas, señales o trucos para el examen teórico. ¿Por dónde empezamos?` }
        ]);
      };

      const startTestMode = () => {
        const list = PREGUNTAS_MOCK[carnet.id] || PREGUNTAS_MOCK["b"]; 
        setQuestions(list);
        setCurrentQIndex(0);
        setSelectedAnswer(null);
        setIsAnswered(false);
        setScore({ correct: 0, wrong: 0 });
        setTestFinished(false);
        setMode("test");
      };

      const handleOptionClick = (index) => {
        if (isAnswered) return;
        setSelectedAnswer(index);
        setIsAnswered(true);
        if (index === questions[currentQIndex].correct) {
          setScore(prev => ({ ...prev, correct: prev.correct + 1 }));
        } else {
          setScore(prev => ({ ...prev, wrong: prev.wrong + 1 }));
        }
      };

      const handleNextQuestion = () => {
        if (currentQIndex + 1 < questions.length) {
          setCurrentQIndex(prev => prev + 1);
          setSelectedAnswer(null);
          setIsAnswered(false);
        } else {
          setTestFinished(true);
        }
      };

      const sendChat = async () => {
        if (!input.trim() || loading) return;
        const userText = input.trim();
        setInput("");
        setMessages(prev => [...prev, { role: "user", content: userText }]);
        setLoading(true);

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "x-api-key": "ANTHROPIC_API_KEY", 
              "anthropic-version": "2023-06-01",
              "content-type": "application/json",
              "dangerouslyAllowBrowser": "true"
            },
            body: JSON.stringify({
              model: "claude-3-5-sonnet-20241022",
              max_tokens: 1024,
              messages: [{ role: "user", content: `Eres un profesor de autoescuela experto para el examen de ${carnet.label}. Responde de forma clara y didáctica: ${userText}` }]
            })
          });
          const data = await res.json();
          const reply = data.content[0].text;
          setMessages(prev => [...prev, { role: "assistant", content: reply }]);
        } catch (err) {
          setMessages(prev => [...prev, { role: "assistant", content: "Lo siento, ha ocurrido un error al conectar con Claude. Revisa tu API Key de Anthropic." }]);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={s.app}>
          <header style={s.header}>
            <div style={s.logo}>CarnetIA</div>
            <div style={s.badge}>Beta</div>
          </header>

          <main style={s.main}>
            {/* PANTALLA 1: LISTA DE CATEGORÍAS */}
            {!mode && (
              <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                <div>
                  <h1 style={s.title}>¿Qué teórico vas a preparar hoy?</h1>
                  <p style={s.subtitle}>Elige tu permiso y aprueba a la primera con tu tutor inteligente.</p>
                </div>
                <div style={s.grid}>
                  {CARNETS.map(c => (
                    <div key={c.id} className="ccard" style={s.card} onClick={() => handleCarnetSelect(c)}>
                      <div style={{ ...s.iconWrap, background: `${c.color}20`, color: c.color }}>{c.emoji}</div>
                      <div style={s.cardContent}>
                        <div style={s.cardTitle}>{c.label}</div>
                        <div style={s.cardDesc}>{c.desc}</div>
                      </div>
                      <div style={s.badge}>{c.preguntas} preg.</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* PANTALLA 2: SELECCIÓN DE MODOS INTERMEDIOS */}
            {mode === "select_mode" && (
              <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <button style={s.backBtn} onClick={() => { setMode(null); setCarnet(null); }}>← Volver</button>
                </div>
                <div>
                  <h1 style={s.title}>{carnet.emoji} {carnet.label}</h1>
                  <p style={s.subtitle}>Selecciona el modo de preparación que deseas utilizar.</p>
                </div>
                <div style={s.grid}>
                  <div className="mcard" style={s.modeOption} onClick={startTestMode}>
                    <div style={{ ...s.modeIcon, background: "rgba(59, 130, 246, 0.1)", color: "#3b82f6" }}>📝</div>
                    <div style={s.cardContent}>
                      <div style={s.cardTitle}>Realizar Test Inteligente</div>
                      <div style={s.cardDesc}>Simula un examen real adaptado con control de errores.</div>
                    </div>
                  </div>
                  <div className="mcard" style={s.modeOption} onClick={startChatMode}>
                    <div style={{ ...s.modeIcon, background: "rgba(16, 185, 129, 0.1)", color: "#10b981" }}>💬</div>
                    <div style={s.cardContent}>
                      <div style={s.cardTitle}>Chat con Tutor IA</div>
                      <div style={s.cardDesc}>Resuelve dudas del temario y pide explicaciones detalladas.</div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* PANTALLA 3: MODO TEST INTERACTIVO */}
            {mode === "test" && (
              <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #1e1e32", paddingBottom: "12px" }}>
                  <button style={s.backBtn} onClick={() => setMode("select_mode")}>← Salir</button>
                  <div style={{ fontSize: "14px", color: "#aaa" }}>
                    Aciertos: <span style={{ color: "#10b981", fontWeight: "bold" }}>{score.correct}</span> | Fallos: <span style={{ color: "#ef4444", fontWeight: "bold" }}>{score.wrong}</span>
                  </div>
                </div>

                {!testFinished ? (
                  <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                    <div style={{ fontSize: "12px", color: carnet.color, fontWeight: "bold" }}>PREGUNTA {currentQIndex + 1} DE {questions.length}</div>
                    <h2 style={{ fontSize: "18px", color: "#fff", fontWeight: "600", lineHeight: "1.4" }}>{questions[currentQIndex]?.q}</h2>
                    
                    <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: "10px" }}>
                      {questions[currentQIndex]?.options.map((opt, idx) => {
                        let currentBg = "#131322";
                        let currentBorder = "#1e1e32";
                        if (isAnswered) {
                          if (idx === questions[currentQIndex].correct) {
                            currentBg = "rgba(16, 185, 129, 0.15)";
                            currentBorder = "#10b981";
                          } else if (idx === selectedAnswer) {
                            currentBg = "rgba(239, 68, 68, 0.15)";
                            currentBorder = "#ef4444";
                          }
                        }
                        return (
                          <div key={idx} className="opt-card" style={{ background: currentBg, borderColor: currentBorder }} onClick={() => handleOptionClick(idx)}>
                            <div style={{ width: "24px", height: "24px", borderRadius: "50%", border: "1px solid #444", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "12px", fontWeight: "bold", background: selectedAnswer === idx ? carnet.color : "transparent" }}>
                              {String.fromCharCode(65 + idx)}
                            </div>
                            <div style={{ flex: 1 }}>{opt}</div>
                          </div>
                        );
                      })}
                    </div>

                    {isAnswered && (
                      <div style={{ display: "flex", justifyContent: "flex-end", marginTop: "10px" }}>
                        <button style={s.btnNext} onClick={handleNextQuestion}>
                          {currentQIndex + 1 === questions.length ? "Ver Resultados" : "Siguiente Pregunta →"}
                        </button>
                      </div>
                    )}
                  </div>
                ) : (
                  <div style={{ textAlign: "center", padding: "30px 10px", display: "flex", flexDirection: "column", gap: 16 }}>
                    <div style={{ fontSize: "50px" }}>🎉</div>
                    <h2 style={s.title}>¡Examen Finalizado!</h2>
                    <p style={s.subtitle}>Has completado todas las preguntas del test teórico.</p>
                    <div style={{ background: "#131322", padding: "20px", borderRadius: "16px", border: "1px solid #1e1e32", display: "flex", justifyContent: "space-around", margin: "10px 0" }}>
                      <div>
                        <div style={{ fontSize: "24px", fontWeight: "bold", color: "#10b981" }}>{score.correct}</div>
                        <div style={{ fontSize: "12px", color: "#8e8e9f" }}>Correctas</div>
                      </div>
                      <div>
                        <div style={{ fontSize: "24px", fontWeight: "bold", color: score.wrong > carnet.fallos ? "#ef4444" : "#10b981" }}>{score.wrong}</div>
                        <div style={{ fontSize: "12px", color: "#8e8e9f" }}>Fallos (Máx. {carnet.fallos})</div>
                      </div>
                    </div>
                    <h3 style={{ fontSize: "18px", color: score.wrong > carnet.fallos ? "#ef4444" : "#10b981", fontWeight: "bold" }}>
                      {score.wrong > carnet.fallos ? "❌ NO APTO (Superas los fallos permitidos)" : "✅ ¡APTO! Buen trabajo"}
                    </h3>
                    <div style={{ marginTop: "10px" }}>
                      <button style={{ ...s.btnNext, background: carnet.color }} onClick={startTestMode}>Repetir Examen</button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* PANTALLA 4: MODO CHAT DE TUTORÍA */}
            {mode === "chat" && (
              <div className="fade-up" style={s.chatContainer}>
                <div style={s.topBar}>
                  <button style={s.backBtn} onClick={() => setMode("select_mode")}>←</button>
                  <div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>Tutor IA: {carnet.label}</div>
                    <div style={{ fontSize: 12, color: carnet.color, fontWeight: 500 }}>En línea • Modo Tutoría activo</div>
                  </div>
                </div>

                <div style={s.messagesArea}>
                  {messages.map((m, i) => (
                    <div key={i} style={{ ...s.msgRow, justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
                      <div style={{ ...s.bubble, background: m.role === "user" ? carnet.color : "#1e1e32", color: m.role === "user" ? "#fff" : "#ddd", borderRadius: m.role === "user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px" }}>
                        {m.content.split("\n").map((l, j) => <span key={j}>{l}{j < m.content.split("\n").length - 1 && <br />}</span>)}
                      </div>
                    </div>
                  ))}
                  {loading && (
                    <div style={{ alignSelf: "flex-start" }}>
                      <div style={{ ...s.bubble, background: "#1e1e32", color: "#888" }}>● ● ●</div>
                    </div>
                  )}
                  <div ref={msgEndRef} />
                </div>
                
                <div style={s.chatInputWrap}>
                  <input style={s.chatInput} placeholder="Escribe tu pregunta…"
                    value={input} onChange={e => setInput(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") sendChat(); }}
                    disabled={loading} />
                  <button style={{ ...s.sendBtn, background: loading ? "#333" : carnet.color }} onClick={sendChat} disabled={loading}>
                    {loading ? "…" : "↑"}
                  </button>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
