<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarnetIA – Aprueba tu carnet con IA</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 1. CONFIGURACIÓN DE CARNETS
    const CARNETS = [
      { id: "b",       label: "Coche B",     emoji: "🚗", color: "#f59e0b", desc: "Permiso tipo B · El más común",     preguntas: 30, fallos: 3 },
      { id: "a",       label: "Moto A/A2",   emoji: "🏍️", color: "#ef4444", desc: "Permiso tipo A · Dos ruedas",       preguntas: 30, fallos: 3 },
      { id: "c",       label: "Camión C",    emoji: "🚛", color: "#3b82f6", desc: "Permiso tipo C · Transporte",        preguntas: 30, fallos: 3 },
      { id: "d",       label: "Autobús D",   emoji: "🚌", color: "#8b5cf6", desc: "Permiso tipo D · Pasajeros",         preguntas: 30, fallos: 3 },
      { id: "nautica", label: "Náutica PNB", emoji: "⛵", color: "#06b6d4", desc: "PNB · Patrón de navegación básica",  preguntas: 30, fallos: 3 },
      { id: "piloto",  label: "Piloto PPL",  emoji: "✈️", color: "#10b981", desc: "Licencia piloto privado",            preguntas: 30, fallos: 3 },
      { id: "caza",    label: "Caza",        emoji: "🏹", color: "#84cc16", desc: "Licencia de caza y pesca",           preguntas: 20, fallos: 4 },
      { id: "armas",   label: "Armas",       emoji: "🔫", color: "#f97316", desc: "Licencia de armas tipo D/E",         preguntas: 20, fallos: 4 }
    ];

    // 2. TEMARIOS POR CATEGORÍA
    const getTopics = (id) => {
      const map = {
        b:       ["Señales de tráfico", "Velocidades máximas", "Prioridad de paso", "Distancias de seguridad", "Alcohol y drogas", "Alumbrado", "Cinturón y SRI"],
        a:       ["Equipamiento obligatorio", "Curvas y frenada", "Viento lateral", "Señales específicas motos", "Mantenimiento básico"],
        c:       ["Masas y dimensiones", "Tacógrafo", "Tiempos de conducción", "Transporte de mercancías", "Frenos y ABS"],
        d:       ["Transporte de viajeros", "Paradas y estaciones", "Emergencias con pasajeros", "Cinturones en autobús"],
        nautica: ["Luces de navegación", "Reglas de rumbo", "Meteorología marina", "Balizamiento", "Señales de socorro"],
        piloto:  ["Meteorología aeronáutica", "Navegación VOR/NDB", "Comunicaciones ATC", "Regulaciones EASA", "Emergencias en vuelo"],
        caza:    ["Épocas de veda", "Especies protegidas", "Seguridad con armas", "Licencias y permisos"],
        armas:   ["Clasificación de armas", "Almacenamiento seguro", "Trámites administrativos", "Normativa vigente"]
      };
      return map[id] || ["Normativa general", "Señales", "Seguridad", "Infracciones", "Primeros auxilios"];
    };

    // 3. PROMPT DEL SISTEMA DE TU PROYECTO ORIGINAL
    const SYSTEM_PROMPT = (label, preguntas, fallos) =>
    `Eres ProfeIA, el mejor tutor español para aprobar el examen de ${label}.
    Eres cercano, motivador y muy preciso con la normativa española actual.
    DATOS OFICIALES DEL EXAMEN DE ${label.toUpperCase()}:
    - Número total de preguntas: ${preguntas}
    - Fallos máximos permitidos para aprobar: ${fallos}

    REGLAS:
    - Si te piden un TEST: responde SOLO con JSON válido, sin texto extra, sin markdown, sin backticks:
    {"preguntas":[{"p":"texto pregunta","ops":["A. opción","B. opción","C. opción"],"ok":0,"exp":"explicación corta"}]}
    El campo "ok" es el índice 0, 1 o 2 de la respuesta correcta.
    - Genera EXACTAMENTE el número de preguntas indicado en el mensaje, ni más ni menos.
    - Si te piden ESTUDIAR: explica con emojis, ejemplos y trucos para memorizar.
    - Si te preguntan algo: responde directo citando normativa española.`;

    function App() {
      const [screen, setScreen] = useState("home");
      const [carnet, setCarnet] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const [questions, setQuestions] = useState([]);
      const [qIdx, setQIdx] = useState(0);
      const [answered, setAnswered] = useState(null);
      const [userAnswers, setUserAnswers] = useState([]);
      const [finished, setFinished] = useState(false);

      const [topic, setTopic] = useState("");
      const [studyText, setStudyText] = useState("");
      const [customTopic, setCustomTopic] = useState("");

      const [msgs, setMsgs] = useState([]);
      const [input, setInput] = useState("");
      const chatRef = useRef(null);

      useEffect(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, [msgs]);

      // FUNCIÓN LLAMADA A LA API DE ANTHROPIC
      const callAI = async (userMsg, history = []) => {
        const c = carnet || { label: "conducción", preguntas: 30, fallos: 3 };
        const messages = history.length ? history : [{ role: "user", content: userMsg }];
        
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "x-api-key": "TU_ANTHROPIC_API_KEY", // <-- RECUERDA PONER TU CLAVE REAL DE ANTHROPIC AQUÍ
            "anthropic-version": "2023-06-01",
            "dangerouslyAllowBrowser": "true"
          },
          body: JSON.stringify({
            model: "claude-3-5-sonnet-20241022",
            max_tokens: 1500,
            system: SYSTEM_PROMPT(c.label, c.preguntas, c.fallos),
            messages
          })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.content?.map(b => b.text || "").join("") || "";
      };

      const parsePreguntas = (raw) => {
        const clean = raw.replace(/```json|```/g, "").trim();
        const start = clean.indexOf("{");
        const end = clean.lastIndexOf("}") + 1;
        const parsed = JSON.parse(clean.slice(start, end));
        return parsed.preguntas || [];
      };

      // TUS DOS LLAMADAS SIMULTÁNEAS EN PARALELO PARA OBTENER LAS 30 PREGUNTAS TOTALES
      const startTest = async () => {
        setScreen("test");
        setLoading(true);
        setError("");
        setQuestions([]);
        setQIdx(0);
        setAnswered(null);
        setUserAnswers([]);
        setFinished(false);
        try {
          const total = carnet.preguntas;
          const mitad = Math.ceil(total / 2);
          const resto = total - mitad;

          const [raw1, raw2] = await Promise.all([
            callAI(`Genera exactamente ${mitad} preguntas de test para el examen oficial de ${carnet.label} en España. Solo JSON válido.`),
            callAI(`Genera exactamente ${resto} preguntas de test DIFERENTES para el examen oficial de ${carnet.label} en España. Solo JSON válido.`)
          ]);
          const todas = [...parsePreguntas(raw1), ...parsePreguntas(raw2)];
          if (todas.length === 0) throw new Error("Sin preguntas");
          setQuestions(todas);
        } catch (err) {
          setError("Error generando el test con IA. Revisa tus credenciales o vuelve a pulsar 'Reintentar'.");
        }
        setLoading(false);
      };

      const pickAnswer = (i) => {
        if (answered !== null) return;
        const correct = questions[qIdx].ok;
        setAnswered(i);
        setUserAnswers(prev => [...prev, { chosen: i, correct }]);
        setTimeout(() => {
          setAnswered(null);
          if (qIdx + 1 >= questions.length) setFinished(true);
          else setQIdx(q => q + 1);
        }, 2000);
      };

      const startStudy = async (t) => {
        setTopic(t);
        setStudyText("");
        setScreen("study-content");
        setLoading(true);
        try {
          const txt = await callAI(`Explícame en detalle el tema "${t}" para el examen de ${carnet.label}. Usa emojis, ejemplos y trucos para memorizar.`);
          setStudyText(txt);
        } catch {
          setStudyText("Error cargando el contenido. Vuelve atrás e inténtalo de nuevo.");
        }
        setLoading(false);
      };

      const sendChat = async () => {
        const txt = input.trim();
        if (!txt || loading) return;
        const newMsgs = [...msgs, { role: "user", content: txt }];
        setMsgs(newMsgs);
        setInput("");
        setLoading(true);
        try {
          const reply = await callAI("", newMsgs);
          setMsgs([...newMsgs, { role: "assistant", content: reply }]);
        } catch {
          setMsgs([...newMsgs, { role: "assistant", content: "❌ Error de conexión. Inténtalo de nuevo." }]);
        }
        setLoading(false);
      };

      const score = userAnswers.filter(a => a.chosen === a.correct).length;
      const fallosCount = questions.length - score;
      const aprobado = carnet && fallosCount <= carnet.fallos;
      const pct = questions.length ? Math.round((score / questions.length) * 100) : 0;
      const go = (sc) => setScreen(sc);
      const goHome = () => { setScreen("home"); setCarnet(null); setMsgs([]); setStudyText(""); setTopic(""); };

      return (
        <div style={s.root}>
          <style>{css}</style>

          <nav style={s.nav}>
            <div style={s.navLogo} onClick={goHome}>
              <span style={s.navIcon}>🎓</span>
              <span style={s.navBrand}>CarnetIA</span>
            </div>
            {carnet && (
              <div style={{ ...s.navBadge, background: carnet.color + "22", border: `1px solid ${carnet.color}55` }}>
                <span>{carnet.emoji}</span>
                <span style={{ color: carnet.color, fontWeight: 600, fontSize: 13 }}>{carnet.label}</span>
              </div>
            )}
          </nav>

          <main style={s.main}>
            {/* PANTALLA: HOME */}
            {screen === "home" && (
              <div className="fade-up">
                <div style={s.hero}>
                  <div style={s.heroChip}>✨ Tutor con Inteligencia Artificial</div>
                  <h1 style={s.heroH1}>Aprueba tu carnet<br /><em style={s.heroEm}>a la primera.</em></h1>
                  <p style={s.heroP}>Simulacros oficiales, explicaciones personalizadas y un tutor IA 24/7. Elige tu carnet.</p>
                </div>
                <div style={s.carnetGrid}>
                  {CARNETS.map((c, i) => (
                    <div key={c.id} className="ccard" style={{ ...s.ccard, animationDelay: `${i * 0.06}s`, '--acc': c.color }} onClick={() => { setCarnet(c); go("menu"); }}>
                      <div style={{ ...s.ccardTop, background: c.color + "18" }}>
                        <span style={s.ccardEmoji}>{c.emoji}</span>
                      </div>
                      <div style={s.ccardBody}>
                        <div style={{ ...s.ccardLabel, color: c.color }}>{c.label}</div>
                        <div style={s.ccardDesc}>{c.desc}</div>
                        <div style={{ ...s.ccardBadge, color: c.color, borderColor: c.color + "55" }}>
                          {c.preguntas} preguntas · máx. {c.fallos} fallos
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* PANTALLA: MENÚ OPCIONES */}
            {screen === "menu" && carnet && (
              <div className="fade-up">
                <button style={s.back} onClick={goHome}>← Cambiar carnet</button>
                <h2 style={s.sectionH}>¿Cómo quieres estudiar?</h2>
                <p style={s.sectionSub}>
                  <strong style={{ color: carnet.color }}>{carnet.label}</strong> · {carnet.preguntas} preguntas · máx. {carnet.fallos} fallos para aprobar
                </p>
                <div style={s.menuGrid}>
                  {[
                    { emoji: "📝", title: `Simulacro oficial (${carnet.preguntas} preguntas)`, desc: `Igual que el examen real · puedes fallar ${carnet.fallos} como máximo`, action: startTest },
                    { emoji: "📚", title: "Estudiar por temas", desc: "Aprende cada bloque con ejemplos, trucos y resúmenes visuales", action: () => go("study") },
                    { emoji: "🤖", title: "Pregunta a la IA", desc: "Resuelve cualquier duda al instante con tu tutor personal", action: () => { setMsgs([]); go("chat"); } }
                  ].map((m, i) => (
                    <div key={i} className="mcard" style={{ '--acc': carnet.color, ...s.mcard }} onClick={m.action}>
                      <div style={{ ...s.mcardIcon, background: carnet.color + "22" }}>{m.emoji}</div>
                      <div style={{ flex: 1 }}>
                        <div style={s.mcardTitle}>{m.title}</div>
                        <div style={s.mcardDesc}>{m.desc}</div>
                      </div>
                      <div style={{ ...s.mcardArr, color: carnet.color }}>→</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* PANTALLA: MODO SIMULACRO EXAMEN */}
            {screen === "test" && (
              <div className="fade-up">
                <button style={s.back} onClick={() => go("menu")}>← Volver</button>
                {loading && !questions.length && (
                  <div style={s.center}>
                    <div style={{ ...s.spinner, borderTopColor: carnet.color }} />
                    <p style={s.loadTxt}>Generando simulacro de {carnet.preguntas} preguntas por IA (Tandas 1 y 2)…</p>
                  </div>
                )}
                {error && (
                  <div style={s.center}>
                    <p style={{ color: "#ef4444", marginBottom: 16 }}>{error}</p>
                    <button style={{ ...s.btnPri, background: carnet.color }} onClick={startTest}>Reintentar</button>
                  </div>
                )}
                {!loading && !error && !finished && questions.length > 0 && (
                  <div>
                    <div style={s.progressWrap}>
                      <div style={s.progressTrack}>
                        <div style={{ ...s.progressFill, width: `${(qIdx / questions.length) * 100}%`, background: carnet.color }} />
                      </div>
                      <span style={s.progressLbl}>{qIdx + 1}/{questions.length}</span>
                    </div>
                    <div style={s.questionCard} key={qIdx} className="fade-up">
                      <div style={{ ...s.qNum, color: carnet.color }}>Pregunta {qIdx + 1} de {questions.length}</div>
                      <p style={s.qText}>{questions[qIdx]?.p}</p>
                      <div style={s.optList}>
                        {questions[qIdx]?.ops.map((op, i) => {
                          const isCorrect = i === questions[qIdx].ok;
                          const isChosen = i === answered;
                          let bg = "#1c1c2e", border = "#2e2e4e", col = "#ccc";
                          if (answered !== null) {
                            if (isCorrect) { bg = "#052e16"; border = "#22c55e"; col = "#4ade80"; }
                            else if (isChosen) { bg = "#2d0000"; border = "#ef4444"; col = "#f87171"; }
                          }
                          return (
                            <button key={i} className="opt-btn" disabled={answered !== null} style={{ ...s.optBtn, background: bg, borderColor: border, color: col }} onClick={() => pickAnswer(i)}>
                              <span style={{ ...s.optLetter, color: answered !== null && isCorrect ? "#4ade80" : answered !== null && isChosen ? "#f87171" : carnet.color }}>
                                {["A","B","C"][i]}
                              </span>
                              {op.replace(/^[ABC]\.\s*/, "")}
                            </button>
                          );
                        })}
                      </div>
                      {answered !== null && answered !== questions[qIdx].ok && (
                        <div style={s.expBox}>💡 {questions[qIdx].exp}</div>
                      )}
                      {answered !== null && answered === questions[qIdx].ok && (
                        <div style={{ ...s.expBox, background: "#052e16", borderColor: "#22c55e33", color: "#4ade80" }}>✅ ¡Correcto!</div>
                      )}
                    </div>
                  </div>
                )}

                {finished && (
                  <div style={s.resultWrap} className="fade-up">
                    <div style={s.resultEmoji}>{aprobado ? "🎉" : "💪"}</div>
                    <h2 style={s.resultH}>{aprobado ? "¡Aprobado!" : "Suspendido — ¡sigue practicando!"}</h2>
                    <div style={s.scoreWrap}>
                      <div style={{ ...s.scoreBig, color: carnet.color }}>{score}/{questions.length}</div>
                      <div style={s.scorePct}>{pct}% de aciertos · {fallosCount} fallos</div>
                      <div style={{ marginTop: 12, fontSize: 14, fontWeight: 700, color: aprobado ? "#4ade80" : "#f87171" }}>
                        {aprobado ? `✅ APROBADO (máx. ${carnet.fallos} fallos permitidos)` : `❌ SUSPENDIDO (${fallosCount} fallos, máx. ${carnet.fallos})`}
                      </div>
                    </div>
                    <div style={s.reviewList}>
                      {questions.map((q, i) => {
                        const ua = userAnswers[i];
                        const ok = ua?.chosen === ua?.correct;
                        return (
                          <div key={i} style={{ ...s.reviewItem, borderLeftColor: ok ? "#22c55e" : "#ef4444" }}>
                            <span style={{ color: ok ? "#22c55e" : "#ef4444", marginRight: 8, flexShrink: 0 }}>{ok ? "✓" : "✗"}</span>
                            <div>
                              <div style={{ fontSize: 13, color: "#ccc", marginBottom: 4 }}>{q.p}</div>
                              {!ok && <div style={{ fontSize: 12, color: "#888" }}>✓ {q.ops[q.ok]} · {q.exp}</div>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={s.resultBtns}>
                      <button style={{ ...s.btnPri, background: carnet.color }} onClick={startTest}>Repetir test</button>
                      <button style={s.btnSec} onClick={() => go("menu")}>Volver al menú</button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* PANTALLA: SELECCIÓN TEMARIO */}
            {screen === "study" && carnet && (
              <div className="fade-up">
                <button style={s.back} onClick={() => go("menu")}>← Volver</button>
                <h2 style={s.sectionH}>Elige un tema</h2>
                <p style={s.sectionSub}>La IA te explicará todo lo que necesitas saber</p>
                <div style={s.topicGrid}>
                  {getTopics(carnet.id).map(t => (
                    <div key={t} className="tcard" style={{ '--acc': carnet.color, ...s.tcard }} onClick={() => startStudy(t)}>
                      <span style={{ ...s.tDot, background: carnet.color }} />{t}
                    </div>
                  ))}
                </div>
                <div style={s.customBox}>
                  <input style={s.customInput} placeholder="O escribe tu propio tema…" value={customTopic} onChange={e => setCustomTopic(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && customTopic.trim()) { startStudy(customTopic.trim()); setCustomTopic(""); } }} />
                  <button style={{ ...s.btnPri, background: carnet.color, minWidth: 100 }} onClick={() => { if (customTopic.trim()) { startStudy(customTopic.trim()); setCustomTopic(""); } }}>Estudiar →</button>
                </div>
              </div>
            )}

            {/* PANTALLA: CONTENIDO EXPLICADO POR LA IA */}
            {screen === "study-content" && (
              <div className="fade-up">
                <button style={s.back} onClick={() => go("study")}>← Volver a temas</button>
                <h2 style={{ ...s.sectionH, color: carnet.color }}>{topic}</h2>
                {loading ? (
                  <div style={s.center}>
                    <div style={{ ...s.spinner, borderTopColor: carnet.color }} />
                    <p style={s.loadTxt}>Preparando la explicación…</p>
                  </div>
                ) : (
                  <div style={s.studyContent}>
                    {studyText.split("\n").map((line, i) => (
                      <p key={i} style={{ marginBottom: line.trim() ? 12 : 6, color: line.startsWith("#") ? "#fff" : "#c8c8d8", fontWeight: line.startsWith("#") ? 700 : 400, fontSize: line.startsWith("#") ? 18 : 15 }}>
                        {line.replace(/^#+\s*/, "")}
                      </p>
                    ))}
                  </div>
                )}
                {!loading && studyText && (
                  <div style={{ display: "flex", gap: 12, marginTop: 24 }}>
                    <button style={{ ...s.btnPri, background: carnet.color }} onClick={startTest}>Hacer simulacro</button>
                    <button style={s.btnSec} onClick={() => go("study")}>Otro tema</button>
                  </div>
                )}
              </div>
            )}

            {/* PANTALLA: TUTOR CHAT CHATEAR CON LA IA */}
            {screen === "chat" && carnet && (
              <div style={s.chatWrap} className="fade-up">
                <button style={s.back} onClick={() => go("menu")}>← Volver</button>
                <h2 style={s.sectionH}>Tutor IA · <span style={{ color: carnet.color }}>{carnet.label}</span></h2>
                <p style={s.sectionSub}>{carnet.preguntas} preguntas · máx. {carnet.fallos} fallos para aprobar</p>
                <div style={s.chatBox} ref={chatRef}>
                  {msgs.length === 0 && (
                    <div style={s.chatEmpty}>
                      <div style={{ fontSize: 40, marginBottom: 12 }}>🤖</div>
                      <p style={{ color: "#888", fontSize: 14, lineHeight: 1.6 }}>
                        ¡Hola! Soy tu tutor para el examen de <strong style={{ color: carnet.color }}>{carnet.label}</strong>.<br />
                        Son <strong>{carnet.preguntas} preguntas</strong> y puedes fallar <strong>{carnet.fallos}</strong> como máximo.
                      </p>
                      <div style={s.suggestions}>
                        {["¿Cuánto tiempo tengo para el examen?", "Dame un consejo para aprobar", "¿Qué temas entran?"].map(q => (
                          <button key={q} style={{ ...s.suggBtn, borderColor: carnet.color + "44", color: carnet.color }} onClick={() => setInput(q)}>{q}</button>
                        ))}
                      </div>
                    </div>
                  )}
                  {msgs.map((m, i) => (
                    <div key={i} style={{ ...s.msg, alignSelf: m.role === "user" ? "flex-end" : "flex-start" }}>
                      <div style={{ ...s.bubble, background: m.role === "user" ? carnet.color : "#1e1e32", color: m.role === "user" ? "#fff" : "#ddd", borderRadius: m.role === "user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px" }}>
                        {m.content.split("\n").map((l, j) => <span key={j}>{l}{j < m.content.split("\n").length - 1 && <br />}</span>)}
                      </div>
                    </div>
                  ))}
                  {loading && (
                    <div style={{ alignSelf: "flex-start" }}>
                      <div style={{ ...s.bubble, background: "#1e1e32", color: "#888" }}>● ● ●</div>
                    </div>
                  )}
                </div>
                <div style={s.chatInputWrap}>
                  <input style={s.chatInput} placeholder="Escribe tu pregunta…" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") sendChat(); }} disabled={loading} />
                  <button style={{ ...s.sendBtn, background: loading ? "#333" : carnet.color }} onClick={sendChat} disabled={loading}>
                    {loading ? "…" : "↑"}
                  </button>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    // 4. DECLARACIÓN DE OBJETOS DE ESTILOS LIMPIOS DE GUIONES PROHIBIDOS
    const s = {
      root: { minHeight: "100vh", background: "#0d0d18", fontFamily: "'DM Sans', sans-serif", color: "#e8e8f0" },
      nav: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 24px", borderBottom: "1px solid #1e1e30", background: "#0d0d18", position: "sticky", top: 0, zIndex: 100 },

      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');
      * { box-sizing: border-box; margin: 0; padding: 0; }
      @keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
      @keyframes spin { to { transform:rotate(360deg) } }
      .fade-up { animation: fadeUp 0.4s ease both; }
      .ccard:hover { transform:translateY(-4px); border-color: var(--acc) !important; box-shadow: 0 8px 32px color-mix(in srgb, var(--acc) 25%, transparent); }
      .mcard:hover { border-color: var(--acc) !important; background: color-mix(in srgb, var(--acc) 5%, #13131f) !important; transform: translateX(4px); }
      .tcard:hover { border-color: var(--acc) !important; background: color-mix(in srgb, var(--acc) 8%, #13131f) !important; }
      .opt-btn:not(:disabled):hover { transform: scale(1.01); }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2e2e4e; border-radius: 2px; }
    `;
