  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CARNETS = [
      { id: "b",       label: "Coche B",     emoji: "🚗", color: "#f59e0b", desc: "Permiso tipo B · El más común",     preguntas: 30, fallos: 3 },
      { id: "a",       label: "Moto A/A2",   emoji: "🏍️", color: "#ef4444", desc: "Permiso tipo A · Dos ruedas",       preguntas: 30, fallos: 3 },
      { id: "c",       label: "Camión C",    emoji: "🚛", color: "#3b82f6", desc: "Permiso tipo C · Transporte",        preguntas: 30, fallos: 3 },
      { id: "d",       label: "Autobús D",   emoji: "🚌", color: "#8b5cf6", desc: "Permiso tipo D · Pasajeros",         preguntas: 30, fallos: 3 },
      { id: "nautica", label: "Náutica PNB", emoji: "⛵", color: "#06b6d4", desc: "PNB · Patrón de navegación básica",  preguntas: 30, fallos: 3 },
      { id: "piloto",  label: "Piloto PPL",  emoji: "✈️", color: "#10b981", desc: "Licencia piloto privado",            preguntas: 30, fallos: 3 },
      { id: "caza",    label: "Caza",        emoji: "🏹", color: "#84cc16", desc: "Licencia de caza y pesca",           preguntas: 20, fallos: 4 },
      { id: "armas",   label: "Armas",       emoji: "🔫", color: "#f97316", desc: "Licencia de armas tipo D/E",         preguntas: 20, fallos: 4 },
    ];

    const getTopics = (id) => {
      const map = {
        b:       ["Señales de tráfico", "Velocidades máximas", "Prioridad de paso", "Distancias de seguridad", "Alcohol y drogas", "Alumbrado", "Cinturón y SRI"],
        a:       ["Equipamiento obligatorio", "Curvas y frenada", "Viento lateral", "Señales específicas motos", "Mantenimiento básico"],
        c:       ["Masas y dimensiones", "Tacógrafo", "Tiempos de conducción", "Transporte de mercancías", "Frenos y ABS"],
        d:       ["Transporte de viajeros", "Paradas y estaciones", "Emergencias con pasajeros", "Cinturones en autobús"],
        nautica: ["Luces de navegación", "Reglas de rumbo", "Meteorología marina", "Balizamiento", "Señales de socorro"],
        piloto:  ["Meteorología aeronáutica", "Navegación VOR/NDB", "Comunicaciones ATC", "Regulaciones EASA", "Emergencias en vuelo"],
        caza:    ["Épocas de veda", "Especies protegidas", "Seguridad con armas", "Licencias y permisos"],
        armas:   ["Clasificación de armas", "Almacenamiento seguro", "Trámites administrativos", "Normativa vigente"],
      };
      return map[id] || ["Normativa general", "Señales", "Seguridad", "Infracciones", "Primeros auxilios"];
    };

    const SYSTEM_PROMPT = (label, preguntas, fallos) =>
`Eres ProfeIA, el mejor tutor español para aprobar el examen de ${label}. Eres cercano, motivador y muy preciso con la normativa española actual.

DATOS OFICIALES DEL EXAMEN DE ${label.toUpperCase()}:
- Número total de preguntas: ${preguntas}
- Fallos máximos permitidos para aprobar: ${fallos}

REGLAS:
- Si te piden un TEST: responde SOLO con JSON válido, sin texto extra, sin markdown, sin backticks:
{"preguntas":[{"p":"texto pregunta","ops":["A. opción","B. opción","C. opción"],"ok":0,"exp":"explicación corta"}]}
El campo "ok" es el índice 0, 1 o 2 de la respuesta correcta.
- Genera EXACTAMENTE el número de preguntas indicado en el mensaje, ni más ni menos.
- Si te piden ESTUDIAR: explica con emojis, ejemplos y trucos para memorizar.
- Si te preguntan algo: responde directo citando normativa española.`;

    const s = {
      root: { minHeight: "100vh", background: "#0d0d18", fontFamily: "'DM Sans', sans-serif", color: "#e8e8f0" },
      nav: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 24px", borderBottom: "1px solid #1e1e30", background: "#0d0d18", position: "sticky", top: 0, zIndex: 100 },
      navLogo: { display: "flex", alignItems: "center", gap: 10, cursor: "pointer" },
      navIcon: { fontSize: 24 },
      navBrand: { fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 20, letterSpacing: -0.5 },
      navBadge: { display: "flex", alignItems: "center", gap: 6, padding: "6px 14px", borderRadius: 20 },
      main: { maxWidth: 760, margin: "0 auto", padding: "32px 20px 80px" },
      hero: { textAlign: "center", marginBottom: 48 },
      heroChip: { display: "inline-block", background: "#1e1e38", border: "1px solid #3a3a5c", borderRadius: 20, padding: "6px 16px", fontSize: 13, color: "#a0a0c8", marginBottom: 20 },
      heroH1: { fontFamily: "'Syne', sans-serif", fontSize: "clamp(32px,7vw,52px)", fontWeight: 800, lineHeight: 1.1, letterSpacing: -1.5, marginBottom: 18 },
      heroEm: { fontStyle: "italic", background: "linear-gradient(135deg, #f59e0b, #ef4444)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" },
      heroP: { color: "#888", fontSize: 16, maxWidth: 500, margin: "0 auto", lineHeight: 1.7 },
      carnetGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: 14 },
      ccard: { background: "#13131f", border: "1px solid #22223a", borderRadius: 16, overflow: "hidden", cursor: "pointer", display: "flex", flexDirection: "column", transition: "all 0.2s", animation: "fadeUp 0.5s ease both" },
      ccardTop: { padding: "22px 16px 14px", display: "flex", justifyContent: "center" },
      ccardEmoji: { fontSize: 36 },
      ccardBody: { padding: "0 14px 14px" },
      ccardLabel: { fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 14, marginBottom: 4 },
      ccardDesc: { fontSize: 11, color: "#666", lineHeight: 1.4, marginBottom: 8 },
      ccardBadge: { fontSize: 10, fontWeight: 700, border: "1px solid", borderRadius: 6, padding: "3px 7px", display: "inline-block" },
      sectionH: { fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 26, marginBottom: 8, letterSpacing: -0.5 },
      sectionSub: { color: "#888", fontSize: 14, marginBottom: 28 },
      menuGrid: { display: "flex", flexDirection: "column", gap: 14 },
      mcard: { display: "flex", alignItems: "center", gap: 16, background: "#13131f", border: "1px solid #22223a", borderRadius: 16, padding: "20px", cursor: "pointer", transition: "all 0.2s" },
      mcardIcon: { width: 52, height: 52, borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, flexShrink: 0 },
      mcardTitle: { fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 15, marginBottom: 4 },
      mcardDesc: { color: "#888", fontSize: 13, lineHeight: 1.5 },
      mcardArr: { marginLeft: "auto", fontSize: 20, fontWeight: 700, flexShrink: 0 },
      back: { background: "none", border: "1px solid #2e2e4e", color: "#888", borderRadius: 10, padding: "8px 16px", fontSize: 13, cursor: "pointer", marginBottom: 28, transition: "all 0.2s" },
      center: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: 300, gap: 20 },
      spinner: { width: 40, height: 40, border: "3px solid #2a2a3e", borderTop: "3px solid", borderRadius: "50%", animation: "spin 0.8s linear infinite" },
      loadTxt: { color: "#888", fontSize: 14 },
      progressWrap: { display: "flex", alignItems: "center", gap: 14, marginBottom: 28 },
      progressTrack: { flex: 1, height: 6, background: "#1e1e32", borderRadius: 3, overflow: "hidden" },
      progressFill: { height: "100%", borderRadius: 3, transition: "width 0.4s ease" },
      progressLbl: { color: "#888", fontSize: 13, flexShrink: 0 },
      questionCard: { background: "#13131f", border: "1px solid #22223a", borderRadius: 20, padding: 28 },
      qNum: { fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 14, fontFamily: "'Syne', sans-serif" },
      qText: { fontSize: 18, fontWeight: 500, lineHeight: 1.6, marginBottom: 28, color: "#f0f0ff" },
      optList: { display: "flex", flexDirection: "column", gap: 10 },
      optBtn: { display: "flex", alignItems: "center", gap: 14, border: "1px solid", borderRadius: 12, padding: "14px 18px", fontSize: 14, textAlign: "left", cursor: "pointer", transition: "all 0.15s", lineHeight: 1.4 },
      optLetter: { fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 15, width: 24, flexShrink: 0 },
      expBox: { marginTop: 18, background: "#1a0a00", border: "1px solid #78350f55", borderRadius: 12, padding: "12px 16px", fontSize: 13, color: "#fbbf24", lineHeight: 1.5 },
      resultWrap: { textAlign: "center" },
      resultEmoji: { fontSize: 64, marginBottom: 16 },
      resultH: { fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 26, marginBottom: 20 },
      scoreWrap: { margin: "0 auto 32px", display: "inline-block" },
      scoreBig: { fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 64, lineHeight: 1 },
      scorePct: { color: "#888", fontSize: 15, marginTop: 4 },
      reviewList: { display: "flex", flexDirection: "column", gap: 10, textAlign: "left", marginBottom: 28 },
      reviewItem: { display: "flex", background: "#13131f", borderLeft: "3px solid", borderRadius: "0 12px 12px 0", padding: "12px 16px" },
      resultBtns: { display: "flex", gap: 12, justifyContent: "center" },
      topicGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10, marginBottom: 24 },
      tcard: { display: "flex", alignItems: "center", gap: 12, background: "#13131f", border: "1px solid #22223a", borderRadius: 12, padding: "14px 16px", cursor: "pointer", fontSize: 14, transition: "all 0.2s" },
      tDot: { width: 8, height: 8, borderRadius: "50%", flexShrink: 0 },
      customBox: { display: "flex", gap: 12, marginTop: 8 },
      customInput: { flex: 1, background: "#13131f", border: "1px solid #2e2e4e", borderRadius: 12, padding: "12px 16px", fontSize: 14, color: "#e8e8f0", outline: "none" },
      studyContent: { background: "#13131f", border: "1px solid #22223a", borderRadius: 20, padding: 28, lineHeight: 1.8 },
      chatWrap: { display: "flex", flexDirection: "column", height: "calc(100vh - 200px)" },
      chatBox: { flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 12, padding: "8px 0 16px" },
      chatEmpty: { flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", padding: 40 },
      suggestions: { display: "flex", flexDirection: "column", gap: 8, marginTop: 20, width: "100%", maxWidth: 360 },
      suggBtn: { background: "none", border: "1px solid", borderRadius: 10, padding: "10px 16px", fontSize: 13, cursor: "pointer", textAlign: "left" },
      msg: { display: "flex", maxWidth: "80%" },
      bubble: { padding: "12px 16px", borderRadius: 18, fontSize: 14, lineHeight: 1.6, maxWidth: "100%" },
      chatInputWrap: { display: "flex", gap: 10, paddingTop: 16, borderTop: "1px solid #1e1e30" },
      chatInput: { flex: 1, background: "#13131f", border: "1px solid #2e2e4e", borderRadius: 14, padding: "13px 18px", fontSize: 14, color: "#e8e8f0", outline: "none" },
      sendBtn: { width: 48, height: 48, borderRadius: 14, border: "none", color: "#fff", fontSize: 20, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" },
      btnPri: { border: "none", color: "#fff", borderRadius: 12, padding: "13px 24px", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "'Syne', sans-serif" },
      btnSec: { background: "#1e1e32", border: "1px solid #2e2e4e", color: "#ccc", borderRadius: 12, padding: "13px 24px", fontSize: 14, fontWeight: 600, cursor: "pointer" },
    };

    function CarnetIA() {
      const [screen, setScreen] = useState("home");
      const [carnet, setCarnet] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const [questions, setQuestions] = useState([]);
      const [qIdx, setQIdx] = useState(0);
      const [answered, setAnswered] = useState(null);
      const [userAnswers, setUserAnswers] = useState([]);
      const [finished, setFinished] = useState(false);

      const [topic, setTopic] = useState("");
      const [studyText, setStudyText] = useState("");
      const [customTopic, setCustomTopic] = useState("");

      const [msgs, setMsgs] = useState([]);
      const [input, setInput] = useState("");
      const chatRef = useRef(null);

      useEffect(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, [msgs]);

      const callAI = async (userMsg, history = []) => {
        const c = carnet || { label: "conducción", preguntas: 30, fallos: 3 };
        const messages = history.length ? history : [{ role: "user", content: userMsg }];
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            system: SYSTEM_PROMPT(c.label, c.preguntas, c.fallos),
            messages,
          }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.content?.map(b => b.text || "").join("") || "";
      };

      const parsePreguntas = (raw) => {
        const clean = raw.replace(/```json|```/g, "").trim();
        const start = clean.indexOf("{");
        const end = clean.lastIndexOf("}") + 1;
        const parsed = JSON.parse(clean.slice(start, end));
        return parsed.preguntas || [];
      };

      const startTest = async () => {
        setScreen("test");
        setLoading(true);
        setError("");
        setQuestions([]);
        setQIdx(0);
        setAnswered(null);
        setUserAnswers([]);
        setFinished(false);
        try {
          const total = carnet.preguntas;
          const mitad = Math.ceil(total / 2);
          const resto = total - mitad;

          const [raw1, raw2] = await Promise.all([
            callAI(`Genera exactamente ${mitad} preguntas de test para el examen oficial de ${carnet.label} en España. Solo JSON válido.`),
            callAI(`Genera exactamente ${resto} preguntas de test DIFERENTES para el examen oficial de ${carnet.label} en España. Solo JSON válido.`),
          ]);

          const todas = [...parsePreguntas(raw1), ...parsePreguntas(raw2)];
          if (todas.length === 0) throw new Error("Sin preguntas");
          setQuestions(todas);
        } catch {
          setError("Error generando el test. Pulsa 'Reintentar'.");
        }
        setLoading(false);
      };

      const pickAnswer = (i) => {
        if (answered !== null) return;
        const correct = questions[qIdx].ok;
        setAnswered(i);
        setUserAnswers(prev => [...prev, { chosen: i, correct }]);
        setTimeout(() => {
          setAnswered(null);
          if (qIdx + 1 >= questions.length) setFinished(true);
          else setQIdx(q => q + 1);
        }, 2000);
      };

      const startStudy = async (t) => {
        setTopic(t);
        setStudyText("");
        setScreen("study-content");
        setLoading(true);
        try {
          const txt = await callAI(`Explícame en detalle el tema "${t}" para el examen de ${carnet.label}. Usa emojis, ejemplos y trucos para memorizar.`);
          setStudyText(txt);
        } catch {
          setStudyText("Error cargando el contenido. Vuelve atrás e inténtalo de nuevo.");
        }
        setLoading(false);
      };

      const sendChat = async () => {
        const txt = input.trim();
        if (!txt || loading) return;
        const newMsgs = [...msgs, { role: "user", content: txt }];
        setMsgs(newMsgs);
        setInput("");
        setLoading(true);
        try {
          const reply = await callAI("", newMsgs);
          setMsgs([...newMsgs, { role: "assistant", content: reply }]);
        } catch {
          setMsgs([...newMsgs, { role: "assistant", content: "❌ Error de conexión. Inténtalo de nuevo." }]);
        }
        setLoading(false);
      };

      const score = userAnswers.filter(a => a.chosen === a.correct).length;
      const fallosCount = questions.length - score;
      const aprobado = carnet && fallosCount <= carnet.fallos;
      const pct = questions.length ? Math.round((score / questions.length) * 100) : 0;

      const go = (sc) => setScreen(sc);
      const goHome = () => { setScreen("home"); setCarnet(null); setMsgs([]); setStudyText(""); setTopic(""); };

      return (
        <div style={s.root}>
          <nav style={s.nav}>
            <div style={s.navLogo} onClick={goHome}>
              <span style={s.navIcon}>🎓</span>
              <span style={s.navBrand}>CarnetIA</span>
            </div>
            {carnet && (
              <div style={{ ...s.navBadge, background: carnet.color + "22", border: `1px solid ${carnet.color}55` }}>
                <span>{carnet.emoji}</span>
                <span style={{ color: carnet.color, fontWeight: 600, fontSize: 13 }}>{carnet.label}</span>
              </div>
            )}
          </nav>

          <main style={s.main}>

            {/* HOME */}
            {screen === "home" && (
              <div className="fade-up">
                <div style={s.hero}>
                  <div style={s.heroChip}>✨ Tutor con Inteligencia Artificial</div>
                  <h1 style={s.heroH1}>Aprueba tu carnet<br /><em style={s.heroEm}>a la primera.</em></h1>
                  <p style={s.heroP}>Simulacros oficiales, explicaciones personalizadas y un tutor IA 24/7. Elige tu carnet.</p>
                </div>
                <div style={s.carnetGrid}>
                  {CARNETS.map((c, i) => (
                    <div key={c.id} className="ccard" style={{ ...s.ccard, animationDelay: `${i * 0.06}s` }}
                      onClick={() => { setCarnet(c); go("menu"); }}>
                      <div style={{ ...s.ccardTop, background: c.color + "18" }}>
                        <span style={s.ccardEmoji}>{c.emoji}</span>
                      </div>
                      <div style={s.ccardBody}>
                        <div style={{ ...s.ccardLabel, color: c.color }}>{c.label}</div>
                        <div style={s.ccardDesc}>{c.desc}</div>
                        <div style={{ ...s.ccardBadge, color: c.color, borderColor: c.color + "55" }}>
                          {c.preguntas} preguntas · máx. {c.fallos} fallos
                        </div>
